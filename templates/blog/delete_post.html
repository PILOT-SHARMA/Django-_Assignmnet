{% extends 'blog/base.html' %}

{% block title %}Delete Post - My Blog{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="delete-card">
    <div class="delete-icon">🗑️</div>
    <h3 style="font-family:'Playfair Display',serif; color:var(--dark); margin-bottom:0.5rem;">
      Delete Post?
    </h3>
    <p style="color:var(--gray); margin-bottom:0.25rem;">You are about to permanently delete:</p>
    <p style="font-weight:700; color:var(--dark); margin-bottom:1.5rem;">"{{ post.title }}"</p>
    <p style="font-size:0.875rem; color:#ef4444; margin-bottom:1.75rem;">
      This action cannot be undone.
    </p>

    <form method="post" class="d-flex gap-2 justify-content-center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger rounded px-4 fw-600">
        <i class="bi bi-trash me-1"></i>Yes, Delete
      </button>
      <a href="{% url 'post_detail' post.pk %}" class="btn btn-outline-secondary rounded px-4">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
